<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; font-family: 'Hanken Grotesk', sans-serif; }

#viewer {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
}

#toolbar {
  flex-shrink: 0;
  background: transparent; 
  padding: .5rem 1rem;
  display: flex; align-items: center; gap: .75rem;
  font-size: 12px;
  position: absolute;
  right: 0; z-index: 2;
}
#img-title { display: none; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; font-size: 12px; }
.tool-btn {
  background: none; border: 1px solid #444; border-radius: 4px;
  font-family: 'Hanken Grotesk', sans-serif;
  font-size: 11px; padding: 4px 10px; cursor: pointer;
  transition: background .1s; flex-shrink: 0;
}
.tool-btn:hover { background: #333; }
#zoom-label { display: none; font-size: 11px; color: #9a9490; flex-shrink: 0; min-width: 44px; text-align: right; }

#content {
  flex: 1; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
#img-wrap {
  position: relative; transform-origin: center center; user-select: none;
}
#img-wrap img { display: block; max-width: none; }

#hint {
  position: absolute; bottom: 1rem; right: 1.5rem;
  font-size: 11px; color: #9a9490;
  pointer-events: none; transition: opacity .5s;
}

#error {
  display: none; flex-direction: column; align-items: center;
  gap: .5rem; color: #9b1c1c; font-size: 13px;
}
#btn-reset { display: none; }

.nav-btn {
  position: fixed; top: 50%; transform: translateY(-50%);
  z-index: 10; text-decoration: none;
  background: rgba(255,255,255,0.7); border: 1px solid #ddd;
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  color: #333; font-size: 18px; line-height: 1;
  transition: background .15s, border-color .15s;
  user-select: none;
}
.nav-btn:hover { background: rgba(255,255,255,0.95); border-color: #aaa; }
#btn-prev { left: 12px; }
#btn-next { right: 12px; }

#btn-close {
  position: fixed; top: 12px; left: 12px;
  z-index: 10; text-decoration: none;
  background: rgba(255,255,255,0.7); border: 1px solid #ddd;
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  color: #333; font-size: 18px; line-height: 1;
  transition: background .15s, border-color .15s;
  user-select: none;
}
#btn-close:hover { background: rgba(255,255,255,0.95); border-color: #aaa; }
</style>
</head>
<body>

<div id="viewer">
  <div id="toolbar">
    <span id="img-title">—</span>
    <span id="zoom-label">100%</span>
    <button class="tool-btn" id="btn-fit">Ajuster</button>
    <button class="tool-btn" id="btn-reset">1:1</button>
  </div>
  <a id="btn-close" href="#" title="Retour au dépôt">&#x2715;</a>
  <a class="nav-btn" id="btn-prev" href="#">&#8249;</a>
  <a class="nav-btn" id="btn-next" href="#">&#8250;</a>
  <div id="content">
    <div id="img-wrap"><img id="img" src="" alt=""></div>
    <div id="error">Image introuvable ou URL manquante.</div>
    <span id="hint">molette pour zoomer &middot; glisser pour déplacer</span>
  </div>
</div>

<script>
function el(id) { return document.getElementById(id); }

var scale  = 1;
var panX   = 0;
var panY   = 0;
var natW   = 0;
var natH   = 0;
var drag   = false;
var dSX = 0, dSY = 0, dPX = 0, dPY = 0;
var hintTmr = null;

function fitScale() {
  var c = el('content');
  var cw = c.clientWidth  - 40;
  var ch = c.clientHeight - 40;
  if (!natW || !natH) return 1;
  return Math.min(cw / natW, ch / natH, 1);
}

function applyTransform() {
  var wrap = el('img-wrap');
  wrap.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
  wrap.style.cursor = scale > fitScale() + 0.001 ? 'grab' : 'default';
  el('zoom-label').textContent = Math.round(scale * 100) + '%';
}

function fit() {
  scale = fitScale(); panX = panY = 0; applyTransform();
}

// ── URL reconstruction ───────────────────────────────────────
// Paramètre attendu : nom_du_fichier_sans_extension
// Ex: ?ref=CaCO3-020
// Le dépôt est déduit du préfixe avant le premier tiret suivi de chiffres
// → depot = "CaCO3", fichier = "CaCO3-020.png"
// → https://raw.githubusercontent.com/nanotheatre/CaCO3/main/artefacts/2000x2000/CaCO3-020.png

var GITHUB_USER = 'nanotheatre';
var GITHUB_SIZE = '2000x2000';
var GITHUB_RAW  = 'https://raw.githubusercontent.com/' + GITHUB_USER;
var GITHUB_REPO = 'https://github.com/' + GITHUB_USER;

// Déduit le nom du dépôt depuis le nom du fichier
// Ex: "CaCO3-020" → "CaCO3"
// Stratégie : tout ce qui précède le dernier "-NNN" (suffixe numérique final)
function getDepot(filename) {
  var m = filename.match(/^(.+)-\d+$/);
  return m ? m[1] : filename;
}

function buildUrl(filename, depot) {
  return GITHUB_RAW + '/' + depot + '/main/artefacts/' + GITHUB_SIZE + '/' + filename + '.png';
}

// Extrait le suffixe numérique d'un nom de fichier (ex: "CaCO3-020" → {num:20, digits:3, prefix:"CaCO3-"})
function getNumSuffix(filename) {
  var m = filename.match(/^(.*?)(\d+)$/);
  return m ? { num: parseInt(m[2], 10), digits: m[2].length, prefix: m[1] } : null;
}

function buildNavRef(prefix, num, digits) {
  if (num < 1) return null;
  return prefix + String(num).padStart(digits, '0');
}

// ── Init ──────────────────────────────────────────────────────
var params  = new URLSearchParams(window.location.search);
var ref     = params.get('ref') || params.get('url') || params.get('art') || params.get('src') || params.get('img');
var currentUrl = null;

if (!ref) {
  el('img-wrap').style.display = 'none';
  el('error').style.display = 'flex';
} else {
  var refFile  = ref; // juste le nom de fichier sans extension
  var refDepot = getDepot(refFile);
  var numInfo  = getNumSuffix(refFile);

  currentUrl = buildUrl(refFile, refDepot);

  // Titre : "Artefact/CaCO3-020"
  document.title = 'Artefact/' + refFile;
  el('img-title').textContent = refFile;

  // Bouton close → dépôt GitHub
  el('btn-close').href = GITHUB_REPO + '/' + refDepot;

  // Navigation prev/next
  if (numInfo) {
    var prevRef = buildNavRef(numInfo.prefix, numInfo.num - 1, numInfo.digits);
    var nextRef = buildNavRef(numInfo.prefix, numInfo.num + 1, numInfo.digits);
    if (prevRef) el('btn-prev').href = '?ref=' + encodeURIComponent(prevRef);
    else el('btn-prev').style.visibility = 'hidden';
    el('btn-next').href = '?ref=' + encodeURIComponent(nextRef);
  } else {
    el('btn-prev').style.visibility = 'hidden';
    el('btn-next').style.visibility = 'hidden';
  }

  var img = el('img');
  img.onload = function() {
    natW = img.naturalWidth;
    natH = img.naturalHeight;
    fit();
    showHint();
  };
  img.onerror = function() {
    el('img-wrap').style.display = 'none';
    el('error').style.display = 'flex';
    el('error').textContent = 'Impossible de charger : ' + currentUrl;
  };
  img.src = currentUrl;
}

function showHint() {
  var h = el('hint');
  h.style.opacity = '1';
  if (hintTmr) clearTimeout(hintTmr);
  hintTmr = setTimeout(function() { h.style.opacity = '0'; }, 2500);
}

// ── Zoom molette ──────────────────────────────────────────────
el('content').addEventListener('wheel', function(e) {
  e.preventDefault();
  var delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.min(1.15, Math.max(0.1, scale * delta));
  applyTransform();
}, { passive: false });

// ── Double-clic → fit ─────────────────────────────────────────
el('content').addEventListener('dblclick', function() { fit(); });

// ── Drag ──────────────────────────────────────────────────────
el('content').addEventListener('mousedown', function(e) {
  if (e.button !== 0) return;
  if (scale <= fitScale() + 0.001) return;
  drag = true; dSX = e.clientX; dSY = e.clientY; dPX = panX; dPY = panY;
  el('img-wrap').style.cursor = 'grabbing';
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!drag) return;
  panX = dPX + (e.clientX - dSX);
  panY = dPY + (e.clientY - dSY);
  applyTransform();
});
document.addEventListener('mouseup', function() {
  if (!drag) return; drag = false; applyTransform();
});

// ── Boutons ───────────────────────────────────────────────────
el('btn-fit').addEventListener('click', function() { fit(); });
el('btn-reset').addEventListener('click', function() { scale = 1; panX = panY = 0; applyTransform(); });

// ── Navigation clavier ────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') {
    var prev = el('btn-prev');
    if (prev.style.visibility !== 'hidden' && prev.href) window.location.href = prev.href;
  } else if (e.key === 'ArrowRight') {
    var next = el('btn-next');
    if (next.style.visibility !== 'hidden' && next.href) window.location.href = next.href;
  } else if (e.key === 'Backspace') {
    var close = el('btn-close');
    if (close.href) window.location.href = close.href;
  }
});

// ── Recalc au resize ──────────────────────────────────────────
window.addEventListener('resize', function() { if (natW) fit(); });
</script>
</body>
</html>
